name: Build UniSplice Release Index

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  push:
    branches: ["main"]
  repository_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout index repo
        uses: actions/checkout@v4

      - name: Fetch UniSplice.Core releases
        run: |
          curl -s https://api.github.com/repos/UniSplice/UniSplice.Core/releases > core.json

      - name: Fetch UniSplice.NativeMono releases
        run: |
          curl -s https://api.github.com/repos/UniSplice/UniSplice.NativeMono/releases > mono.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build index.json
        run: node build-index.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update index.json"
          git push
